{% extends "base.html" %}

{% block content %}

<style>

.search-card{
width:420px;
margin:auto;
margin-top:60px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

.search-card h2{
margin-bottom:25px;
color:#6b1f1f;
}

.search-input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
font-size:15px;
}

.search-btn{
width:100%;
padding:12px;
background:#b03a3a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.search-btn:hover{
background:#8c2e2e;
}

.donor-table{
width:90%;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.call-btn{
background:#2ecc71;
color:white;
padding:6px 12px;
border-radius:5px;
text-decoration:none;
}

</style>


<div class="search-card">

<h2>Search Blood Donors</h2>

<form method="POST">

<input
type="text"
name="blood_group"
list="bloodgroups"
placeholder="Type or select blood group"
class="search-input"
required>

<datalist id="bloodgroups">
<option value="O+">
<option value="O-">
<option value="A+">
<option value="A-">
<option value="B+">
<option value="B-">
<option value="AB+">
<option value="AB-">
</datalist>

<button type="submit" class="search-btn">
Search
</button>

</form>

</div>


{% if students %}

<div class="donor-table">

<h3>Available Donors</h3>

<table>

<tr>
<th>Name</th>
<th>Register No</th>
<th>Department</th>
<th>Blood Group</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[6]}}</td>
<td>{{s[7]}}</td>
<td>
<a href="tel:{{s[7]}}" class="call-btn">Call</a>
</td>
</tr>

{% endfor %}

</table>

</div>

{% endif %}

{% endblock %}
