{% extends "base.html" %}

{% block content %}

<h2>Students with {{ blood_group }} Blood Group</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Department</th>
<th>Phone</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student[1] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[6] }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
