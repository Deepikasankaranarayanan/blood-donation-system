{% extends "base.html" %}

{% block content %}

<style>

.database-container{
width:90%;
margin:auto;
margin-top:40px;
}

.database-title{
font-size:28px;
font-weight:600;
margin-bottom:25px;
}

.table-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f5f5f5;
padding:12px;
font-size:15px;
text-align:center;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

.delete-btn{
background:#e74c3c;
color:white;
padding:6px 12px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.delete-btn:hover{
background:#c0392b;
}

</style>
<form action="/upload_csv" method="POST" enctype="multipart/form-data">

<input type="file" name="file" accept=".csv" required>

<button type="submit" style="
padding:8px 15px;
background:#b23b3b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
Upload CSV
</button>

</form>


<div class="database-container">

<div class="database-title">
Student Blood Database
</div>

<div class="table-card">

<table>

<tr>
<th>Name</th>
<th>Register No</th>
<th>Department</th>
<th>Dept No</th>
<th>Year</th>
<th>Blood Group</th>
<th>Phone</th>
<th>Action</th>
</tr>


{% for s in students %}

<tr>

<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>
<td>{{s[5]}}</td>
<td>{{s[6]}}</td>
<td>{{s[7]}}</td>

<td>

<a href="/delete_student/{{s[0]}}" 
class="delete-btn"
onclick="return confirm('Are you sure you want to delete this student?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
